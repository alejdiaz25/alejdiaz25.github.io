<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alejandro Diaz — Mechanical Engineer</title>
  <meta name="description" content="Mechanical Engineering student at UT Austin — aerospace, robotics, and advanced manufacturing." />

  <!-- Stylesheets -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/animations.css" />
</head>
<body>

<!-- ── NAV ──────────────────────────────────────────────────── -->
<nav id="site-nav">
  <a class="nav-logo" href="index.html" style="display:flex;text-decoration:none;color:inherit;">Alejandro Diaz<span> — </span>Portfolio</a>
  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#experience">Experience</a></li>
    <li><a href="projects.html">Projects</a></li>
    <li><a href="#coursework">Coursework</a></li>
    <li><a href="#skills">Skills</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

<!-- ── HERO ─────────────────────────────────────────────────── -->
<section id="hero">
  <canvas id="hero-canvas"></canvas>
  <div class="hero-grid-overlay"></div>
  <div class="hero-vignette"></div>
  <div class="hero-fade"></div>


  <div class="hero-content">
    <p class="hero-system-label">ME · Aerospace · Robotics · Manufacturing</p>

    <h1 class="hero-name">
      <span class="first">Alejandro</span>
      <span class="last"><span class="last-inner">Diaz</span></span>
    </h1>

    <p class="hero-descriptor">
      Mechanical Engineering
      <span class="pipe">|</span>
      UT Austin
      <span class="pipe">|</span>
      Dec 2026
    </p>

    <div class="hero-data">
      <div class="hero-data-cell">
        <div class="hdc-label">GPA</div>
        <div class="hdc-value gold">3.84</div>
      </div>
      <div class="hero-data-cell">
        <div class="hdc-label">Clearance</div>
        <div class="hdc-value gold">U.S. Secret</div>
      </div>
    </div>

    <div class="hero-cta">
      <a href="projects.html" class="btn-primary">View Projects ↗</a>
      <a href="resume.pdf" class="btn-ghost" target="_blank">Resume ↗</a>
    </div>
  </div>

  <div class="hero-scroll">
    <div class="hero-scroll-line"></div>
    <span class="hero-scroll-label">Scroll</span>
  </div>
</section>

<!-- ── ABOUT ─────────────────────────────────────────────────── -->
<section id="about">
  <div class="container">
    <div class="about-grid" id="about-content"></div>
  </div>
</section>

<!-- ── EXPERIENCE ──────────────────────────────────────────── -->
<section id="experience">
  <div class="container" id="experience-content"></div>
</section>

<!-- ── PROJECTS PREVIEW ───────────────────────────────────── -->
<section id="projects-preview">
  <div class="container" id="projects-preview-content"></div>
</section>

<!-- ── COURSEWORK ──────────────────────────────────────────── -->
<section id="coursework">
  <div class="container" id="coursework-content"></div>
</section>

<!-- ── SKILLS ──────────────────────────────────────────────── -->
<section id="skills">
  <div class="container" id="skills-content"></div>
</section>

<!-- ── CONTACT ─────────────────────────────────────────────── -->
<section id="contact">
  <div class="container">
    <div class="contact-grid" id="contact-content"></div>
  </div>
</section>

<!-- ── FOOTER ─────────────────────────────────────────────── -->
<footer id="footer-content"></footer>

<!-- ── SCRIPTS ─────────────────────────────────────────────── -->
<script src="hero-bg.js"></script>
<script>window.initHeroBg();</script>
<script src="js/scramble.js"></script>
<script>
'use strict';

/* ── CONTENT RENDERER — fetches content.json, populates all sections ── */
(function () {
  Promise.all([
    fetch('content.json').then(r => r.json()),
    fetch('projects.json').then(r => r.json()),
  ])
    .then(([C, P]) => renderAll(C, P))
    .catch(e => console.error('Failed to load data:', e));

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function renderAll(C, P) {
    renderAbout(C.about);
    renderExperience(C.experience);
    renderProjectsPreview(P.preview);
    renderCoursework(C.coursework);
    renderSkills(C.skills);
    renderContact(C.contact);
    renderFooter(C.footer);

    /* Re-init scroll animations and scramble after DOM is populated */
    if (window.initAnimations) window.initAnimations();

    /* Scroll to hash target after dynamic content is rendered
       (fixes cross-page nav from projects.html → index.html#section) */
    if (location.hash) {
      var target = document.querySelector(location.hash);
      if (target) target.scrollIntoView();
    }
  }

  /* ── ABOUT ──────────────────────────────────────────────── */
  function renderAbout(d) {
    const el = document.getElementById('about-content');
    const statsHtml = d.stats.map(s =>
      `<div class="stat-cell"><div class="stat-num">${esc(s.num)}</div><div class="stat-label">${esc(s.label)}</div></div>`
    ).join('');
    const parasHtml = d.paragraphs.map(p => `<p>${p}</p>`).join('');

    let mediaHtml = '';
    if (d.photos && d.photos.length > 0) {
      const total = d.photos.length;
      const slidesHtml = d.photos.map((ph, i) =>
        `<div class="ac-slide${i === 0 ? ' active' : ''}"><img src="${esc(ph.src)}" alt="${esc(ph.alt)}" loading="lazy" /></div>`
      ).join('');
      const dotsHtml = d.photos.map((_, i) =>
        `<span class="ac-dot${i === 0 ? ' active' : ''}"></span>`
      ).join('');
      mediaHtml = `
        <div class="about-carousel enter-fade" style="transition-delay:80ms">
          <div class="ac-wrap">
            <div class="ac-bracket tl"></div>
            <div class="ac-bracket tr"></div>
            <div class="ac-bracket bl"></div>
            <div class="ac-bracket br"></div>
            ${slidesHtml}
            <button class="ac-side-btn ac-prev" aria-label="Previous">&#8592;</button>
            <button class="ac-side-btn ac-next" aria-label="Next">&#8594;</button>
          </div>
          <div class="ac-controls">
            <div class="ac-dots">${dotsHtml}</div>
            <span class="ac-counter">01 / ${String(total).padStart(2, '0')}</span>
          </div>
        </div>`;
    } else if (d.headshot) {
      const hs = d.headshot;
      mediaHtml = `<div class="about-headshot enter-fade" style="transition-delay:80ms">
           <img src="${esc(hs.src)}" alt="${esc(hs.alt)}" width="${hs.width}" height="${hs.height}" loading="lazy" />
         </div>`;
    }

    el.innerHTML = `
      <div class="about-left">
        <p class="section-eyebrow enter-fade" style="transition-delay:0ms">${esc(d.eyebrow)}</p>
        <div class="rule"></div>
        <h2 class="section-title enter-fade" style="transition-delay:160ms">${d.title}</h2>
        <div class="stat-grid enter-stagger">${statsHtml}</div>
        ${mediaHtml}
      </div>
      <div class="about-body enter-fade">
        ${parasHtml}
        <div class="clearance-tag"><div class="dot"></div><span>${esc(d.clearance)}</span></div>
      </div>`;

    if (d.photos && d.photos.length > 0) {
      initAboutCarousel(d.photos.length);
    }
  }

  function initAboutCarousel(total) {
    const wrap = document.querySelector('.about-carousel');
    if (!wrap) return;
    const slides = wrap.querySelectorAll('.ac-slide');
    const dots   = wrap.querySelectorAll('.ac-dot');
    const counter = wrap.querySelector('.ac-counter');
    const prevBtn = wrap.querySelector('.ac-prev');
    const nextBtn = wrap.querySelector('.ac-next');
    let current = 0;
    let autoTimer = null;

    function goTo(index) {
      index = ((index % total) + total) % total;
      slides[current].classList.remove('active');
      dots[current].classList.remove('active');
      current = index;
      slides[current].classList.add('active');
      dots[current].classList.add('active');
      counter.textContent = `${String(current + 1).padStart(2, '0')} / ${String(total).padStart(2, '0')}`;
    }

    function startAuto() {
      clearInterval(autoTimer);
      autoTimer = setInterval(() => goTo(current + 1), 4000);
    }

    prevBtn.addEventListener('click', () => { goTo(current - 1); startAuto(); });
    nextBtn.addEventListener('click', () => { goTo(current + 1); startAuto(); });
    dots.forEach((dot, i) => dot.addEventListener('click', () => { goTo(i); startAuto(); }));
    wrap.addEventListener('mouseenter', () => clearInterval(autoTimer));
    wrap.addEventListener('mouseleave', startAuto);

    startAuto();
  }

  /* ── EXPERIENCE ─────────────────────────────────────────── */
  function renderExperience(d) {
    const el = document.getElementById('experience-content');
    function buildItems(items) {
      return items.map(item => {
        const bullets = item.bullets.map(b => `<li>${b}</li>`).join('');
        return `<div class="exp-item enter-line">
          <div class="exp-left">
            <div class="exp-company">${esc(item.company)}</div>
            <div class="exp-period">${esc(item.period)}</div>
          </div>
          <div>
            <div class="exp-role">${item.role}</div>
            <ul class="exp-bullets">${bullets}</ul>
          </div>
        </div>`;
      }).join('');
    }
    const relevantHtml = d.relevantItems ? `
      <h2 class="section-title enter-fade" style="margin-top:4rem;transition-delay:160ms">${esc(d.relevantTitle)}</h2>
      <div class="exp-list">${buildItems(d.relevantItems)}</div>` : '';
    el.innerHTML = `
      <p class="section-eyebrow enter-fade" style="transition-delay:0ms">${esc(d.eyebrow)}</p>
      <div class="rule"></div>
      <h2 class="section-title enter-fade" style="transition-delay:160ms">${esc(d.title)}</h2>
      <div class="exp-list">${buildItems(d.items)}</div>
      ${relevantHtml}`;
  }

  /* ── PROJECTS PREVIEW ───────────────────────────────────── */
  function renderProjectsPreview(d) {
    const el = document.getElementById('projects-preview-content');
    const COLS = 3;
    const remainder = d.thumbs.length % COLS;
    const wipHtml = remainder !== 0
      ? `<div class="preview-wip">
           <div class="preview-wip-icon">⬡</div>
           <div class="preview-wip-label">In Development</div>
           <div class="preview-wip-sub">More projects incoming</div>
         </div>`
      : '';
    const thumbsHtml = d.thumbs.map(t =>
      `<a href="projects.html?project=${esc(t.id)}" class="preview-thumb" data-project="${esc(t.id)}">
        <img src="${esc(t.img)}" alt="${esc(t.alt)}" width="${t.width}" height="${t.height}" loading="lazy" />
        <div class="thumb-label">${esc(t.label)}</div>
      </a>`
    ).join('');
    el.innerHTML = `
      <p class="section-eyebrow enter-fade" style="transition-delay:0ms">${esc(d.eyebrow)}</p>
      <div class="rule"></div>
      <h2 class="section-title enter-fade" style="transition-delay:160ms">${esc(d.title)}</h2>
      <a href="${esc(d.link.href)}" class="preview-link">${esc(d.link.text)}</a>
      <div class="preview-grid enter-stagger">${thumbsHtml}${wipHtml}</div>`;
  }

  /* ── COURSEWORK ─────────────────────────────────────────── */
  function renderCoursework(d) {
    const el = document.getElementById('coursework-content');
    const coursesHtml = d.courses.map(c =>
      `<div class="course-row"><div class="course-code">${esc(c.code)}</div><div class="course-name">${esc(c.name)}</div></div>`
    ).join('');
    const projsHtml = d.academicProjects.map(p => {
      const tagsHtml = (p.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join('');
      const wipHtml = p.wip ? '<span class="cw-wip">In Progress</span>' : '';
      const tagsBlock = tagsHtml ? `<div class="project-tags" style="padding:0.75rem 0 0;">${tagsHtml}</div>` : '';
      return `<div class="cw-card enter-line">
        <div class="cw-label">${esc(p.label)}</div>
        <div class="cw-name">${esc(p.name)}</div>
        <div class="cw-desc">${esc(p.desc)}</div>
        ${tagsBlock}${wipHtml}
      </div>`;
    }).join('');
    el.innerHTML = `
      <p class="section-eyebrow enter-fade" style="transition-delay:0ms">${esc(d.eyebrow)}</p>
      <div class="rule"></div>
      <h2 class="section-title enter-fade" style="transition-delay:160ms">${esc(d.title)}</h2>
      <div class="cw-grid">
        <div>
          <p style="font-family:var(--font-mono);font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-muted);margin-bottom:1rem;">Relevant Courses</p>
          <div class="courses-table">${coursesHtml}</div>
        </div>
        <div>
          <p style="font-family:var(--font-mono);font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-muted);margin-bottom:1rem;">Academic Projects</p>
          <div class="cw-projects">${projsHtml}</div>
        </div>
      </div>`;
  }

  /* ── SKILLS ─────────────────────────────────────────────── */
  function renderSkills(d) {
    const el = document.getElementById('skills-content');
    const groupsHtml = d.groups.map(g => {
      const tags = g.tags.map(t => `<span class="skill-tag">${esc(t)}</span>`).join('');
      return `<div>
        <div class="skill-group-label">${esc(g.label)}</div>
        <div class="skill-tags enter-stagger">${tags}</div>
      </div>`;
    }).join('');
    const subHtml = d.subtitle ? `<p class="skills-subtitle enter-fade" style="transition-delay:240ms">${esc(d.subtitle)}</p>` : '';
    el.innerHTML = `
      <p class="section-eyebrow enter-fade" style="transition-delay:0ms">${esc(d.eyebrow)}</p>
      <div class="rule"></div>
      <h2 class="section-title enter-fade" style="transition-delay:160ms">${esc(d.title)}</h2>
      ${subHtml}
      <div class="skills-grid">${groupsHtml}</div>`;
  }

  /* ── CONTACT ────────────────────────────────────────────── */
  function renderContact(d) {
    const el = document.getElementById('contact-content');
    const linksHtml = d.links.map(l => {
      if (l.static) {
        return `<div class="contact-link" style="cursor:default;">
          <div class="contact-link-inner">
            <div class="contact-link-label">${esc(l.label)}</div>
            <div class="contact-link-value">${esc(l.value)}</div>
          </div>
          <span class="contact-arrow" style="font-size:0.6rem;letter-spacing:0.1em;">${esc(l.arrow)}</span>
        </div>`;
      }
      const target = l.external ? ' target="_blank"' : '';
      return `<a href="${esc(l.href)}"${target} class="contact-link">
        <div class="contact-link-inner">
          <div class="contact-link-label">${esc(l.label)}</div>
          <div class="contact-link-value">${esc(l.value)}</div>
        </div>
        <span class="contact-arrow">→</span>
      </a>`;
    }).join('');
    el.innerHTML = `
      <div>
        <p class="section-eyebrow enter-fade" style="transition-delay:0ms">${esc(d.eyebrow)}</p>
        <div class="rule"></div>
        <h2 class="contact-heading">${d.heading}</h2>
        <p class="contact-sub">${esc(d.sub)}</p>
        <a href="${esc(d.resumeHref)}" class="btn-primary" target="_blank">View Resume ↗</a>
      </div>
      <div class="contact-links enter-stagger">${linksHtml}</div>`;
  }

  /* ── FOOTER ─────────────────────────────────────────────── */
  function renderFooter(d) {
    const el = document.getElementById('footer-content');
    el.innerHTML = `
      <p>${esc(d.copyright)}</p>
      <div class="footer-right">
        <div class="footer-status"><div class="dot"></div><span>${esc(d.status)}</span></div>
        <p>${esc(d.school)}</p>
      </div>`;
  }
})();
</script>
<script src="js/animations.js"></script>
<script src="js/nav.js"></script>
</body>
</html>
