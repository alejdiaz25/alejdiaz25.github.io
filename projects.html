<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — Alejandro Diaz</title>
  <meta name="description" content="Engineering project portfolio — aerospace, robotics, and advanced manufacturing." />

  <!-- Stylesheets -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/animations.css" />

  <!-- Three.js importmap (required by CDN module internals) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
  }
  </script>

  <!-- Anime.js -->
  <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js"></script>

  <style>
    /* ── PROJECTS PAGE OVERRIDES ───────────────────────────── */
    :root {
      --left-w:   260px;
      --center-w: 360px;
    }

    body {
      overflow-y: hidden; /* viewer is full-height */
    }

    /* ── PAGE SHELL ─────────────────────────────────────────── */
    .page-shell {
      padding-top: var(--nav-h);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Page header bar */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 44px;
      min-height: 44px;
      border-bottom: 1px solid var(--border-dim);
      background: var(--surface-titanium);
    }
    .page-header-label {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--text-faint);
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .page-header-label::before {
      content: '';
      display: block;
      width: 16px;
      height: 1px;
      background: var(--accent-gold);
      opacity: 0.6;
    }
    .page-header-count {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.15em;
      color: var(--text-faint);
    }

    /* ── 3-PANE VIEWER ──────────────────────────────────────── */
    .project-viewer {
      display: grid;
      grid-template-columns: var(--left-w) 0px 1fr;
      flex: 1;
      min-height: 0;
      transition: grid-template-columns 300ms var(--ease-expo);
    }
    .project-viewer.specs-open {
      grid-template-columns: var(--left-w) var(--center-w) 1fr;
    }
    .project-viewer.specs-open.wide-specs {
      --center-w: 480px;
    }

    /* ── LEFT PANE ──────────────────────────────────────────── */
    #left-pane {
      border-right: 1px solid var(--border-machined);
      overflow-y: auto;
      overflow-x: hidden;
      background: var(--surface-titanium);
      display: flex;
      flex-direction: column;
    }
    #left-pane::-webkit-scrollbar { width: 2px; }

    .left-pane-header {
      padding: 1rem 1rem 0.75rem;
      border-bottom: 1px solid var(--border-dim);
      flex-shrink: 0;
    }
    .left-pane-header-label {
      font-family: var(--font-mono);
      font-size: 0.52rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--text-faint);
    }

    .project-list {
      list-style: none;
      flex: 1;
      overflow-y: auto;
    }

    .project-item {
      position: relative;
      padding: 0.9rem 1rem 0.9rem 1.25rem;
      border-bottom: 1px solid var(--border-dim);
      cursor: pointer;
      display: flex;
      align-items: stretch;
      gap: 0.75rem;
      transition: background 0.18s var(--ease-sine), transform 0.2s var(--ease-expo);
    }
    .project-item:hover { background: var(--surface-raised); transform: translateX(2px); }
    .project-item.active {
      background: var(--accent-gold-dim);
      transform: translateX(2px);
    }

    /* Gold left indicator bar */
    .item-indicator {
      width: 2px;
      background: transparent;
      border-radius: 0;
      flex-shrink: 0;
      align-self: stretch;
      transition: background 0.2s, width 0.2s var(--ease-expo);
    }
    .project-item:hover .item-indicator { background: rgba(197,160,89,0.4); }
    .project-item.active .item-indicator { background: var(--accent-gold); width: 3px; }

    .item-text { flex: 1; min-width: 0; }
    .item-org {
      font-family: var(--font-mono);
      font-size: 0.52rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent-gold);
      margin-bottom: 0.2rem;
      opacity: 0.8;
    }
    .item-title {
      font-size: 0.82rem;
      font-weight: 400;
      color: var(--text-primary);
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .item-sub {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      color: var(--text-faint);
      margin-top: 0.15rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .item-arrow {
      font-size: 0.6rem;
      color: var(--text-faint);
      align-self: center;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .project-item:hover .item-arrow,
    .project-item.active .item-arrow { opacity: 1; color: var(--accent-gold); }

    /* ── CENTER PANE ────────────────────────────────────────── */
    #center-pane {
      border-right: 1px solid var(--border-machined);
      overflow: hidden;
      background: var(--bg-deep-space);
      display: flex;
      flex-direction: column;
      position: relative;
      /* slide-in via opacity+translateX when grid column expands */
      opacity: 0;
      transform: translateX(-12px);
      transition:
        opacity 260ms var(--ease-expo) 60ms,
        transform 300ms var(--ease-expo) 40ms;
      pointer-events: none;
    }
    .specs-open #center-pane {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }

    .center-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.25rem;
      height: 44px;
      min-height: 44px;
      border-bottom: 1px solid var(--border-machined);
      flex-shrink: 0;
    }
    .center-header-label {
      font-family: var(--font-mono);
      font-size: 0.52rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--text-faint);
    }
    .close-btn {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--accent-gold);
      font-size: 0.9rem;
      border: 1px solid var(--accent-gold);
      background: none;
      transition: background 0.18s, color 0.18s, border-color 0.18s;
      font-family: var(--font-mono);
    }
    .close-btn:hover { background: var(--accent-gold); color: var(--surface-raised); }

    .center-content {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 1.25rem;
    }
    .center-content::-webkit-scrollbar { width: 2px; }

    /* HUD corner brackets on center pane top-left */
    .center-bracket-tl,
    .center-bracket-br {
      position: absolute;
      width: 10px;
      height: 10px;
      pointer-events: none;
    }
    .center-bracket-tl {
      top: 44px;
      left: 0;
      border-top: 1px solid var(--accent-gold);
      border-left: 1px solid var(--accent-gold);
      opacity: 0.5;
    }
    .center-bracket-br {
      bottom: 0;
      right: 0;
      border-bottom: 1px solid var(--accent-gold);
      border-right: 1px solid var(--accent-gold);
      opacity: 0.5;
    }

    .spec-project-title {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text-primary);
      line-height: 1.2;
      margin-bottom: 0.2rem;
      transition: opacity 0.3s ease;
    }
    .spec-project-org {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent-gold);
      margin-bottom: 1rem;
      transition: opacity 0.3s ease;
    }
    .spec-project-desc {
      font-size: 0.8rem;
      color: var(--text-muted);
      line-height: 1.75;
      margin-bottom: 1.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border-dim);
    }

    /* Spec table */
    .spec-section-label {
      font-family: var(--font-mono);
      font-size: 0.5rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-faint);
      margin-bottom: 0.5rem;
      margin-top: 1.25rem;
      transition: opacity 0.3s ease;
    }
    .spec-row {
      display: grid;
      grid-template-columns: 90px 1fr;
      border-bottom: 1px solid var(--border-dim);
      padding: 0.45rem 0;
      align-items: start;
      transition: opacity 0.3s ease;
    }
    .spec-row:last-of-type { border-bottom: none; }
    .spec-key {
      font-family: var(--font-mono);
      font-size: 0.56rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-faint);
      padding-right: 0.75rem;
      line-height: 1.6;
      transition: opacity 0.3s ease;
    }
    .spec-val {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      color: var(--text-muted);
      line-height: 1.6;
      transition: opacity 0.3s ease;
    }
    .spec-val.gold { color: var(--accent-gold); }

    /* Tag pills */
    .spec-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-top: 1.25rem;
    }
    .spec-tag {
      font-family: var(--font-mono);
      font-size: 0.52rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-faint);
      padding: 0.2rem 0.55rem;
      border: 1px solid var(--border-machined);
      background: var(--surface-raised);
    }

    /* ── RIGHT PANE — THE STAGE ─────────────────────────────── */
    #right-pane {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg-deep-space);
      min-width: 0;
    }

    .stage-header {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      height: 44px;
      min-height: 44px;
      border-bottom: 1px solid var(--border-dim);
      flex-shrink: 0;
    }
    #right-pane.has-project .stage-header { display: flex; }
    .stage-project-name {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .stage-slide-counter {
      font-family: var(--font-mono);
      font-size: 0.52rem;
      letter-spacing: 0.15em;
      color: var(--text-faint);
    }

    /* Carousel wrapper */
    .carousel-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      min-height: 0;
    }

    /* Individual slides */
    .carousel-slide {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transform: scale(0.98);
      transition: opacity 320ms var(--ease-expo), transform 320ms var(--ease-expo);
    }
    .carousel-slide.active {
      opacity: 1;
      pointer-events: auto;
      transform: scale(1);
    }

    /* Slide 0 — 3D Stage */
    .slide-stage {
      position: relative;
      width: 100%;
      height: 100%;
    }

    /* Static preview image */
    .preview-img {
      max-width: calc(100% - 3rem);
      max-height: calc(100% - 3rem);
      object-fit: contain;
      border: 1px solid rgba(197,160,89,0.45);
    }

    /* Placeholder when no image is set */
    .preview-placeholder {
      width: 100%;
      height: 100%;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      color: var(--text-faint);
    }
    .preview-placeholder-icon {
      font-size: 2.5rem;
      opacity: 0.15;
    }
    .preview-placeholder-label {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-faint);
      opacity: 0.5;
    }

    /* HUD corner brackets around the stage — hidden until project selected */
    .hud-bracket {
      position: absolute;
      width: 18px;
      height: 18px;
      pointer-events: none;
      z-index: 2;
      display: none;
    }
    #right-pane.has-project .hud-bracket { display: block; }
    .hud-bracket.tl { top: 12px; left: 12px; border-top: 1px solid var(--accent-gold); border-left: 1px solid var(--accent-gold); opacity: 0.45; }
    .hud-bracket.tr { top: 12px; right: 12px; border-top: 1px solid var(--accent-gold); border-right: 1px solid var(--accent-gold); opacity: 0.45; }
    .hud-bracket.bl { bottom: 12px; left: 12px; border-bottom: 1px solid var(--accent-gold); border-left: 1px solid var(--accent-gold); opacity: 0.45; }
    .hud-bracket.br { bottom: 12px; right: 12px; border-bottom: 1px solid var(--accent-gold); border-right: 1px solid var(--accent-gold); opacity: 0.45; }

    /* "Load Interactive 3D" button overlay */
    .load-3d-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 3;
      pointer-events: none;
    }
    .load-3d-overlay.visible { pointer-events: auto; }

    .load-3d-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1.75rem;
      background: rgba(9,10,12,0.85);
      border: 1px solid var(--accent-gold);
      color: var(--accent-gold);
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background 0.2s, color 0.2s;
    }
    .load-3d-btn:hover { background: var(--accent-gold-dim); }
    .load-3d-btn::before {
      content: '⬡';
      font-size: 0.75rem;
      opacity: 0.7;
    }

    /* Three.js canvas — overlays slide 0 */
    #three-stage {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 4;
      visibility: hidden;
      opacity: 0;
      transition: opacity 260ms var(--ease-expo);
      touch-action: pan-y;
      display: block;
    }
    #three-stage.loaded {
      visibility: visible;
      opacity: 1;
    }

    /* Reset view button (injected by viewer.js) */
    .viewer-reset-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 7;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface-raised);
      border: 1px solid var(--accent-gold);
      color: var(--accent-gold);
      font-size: 0;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 260ms var(--ease-expo), background 0.18s, color 0.18s;
    }
    .viewer-reset-btn.visible {
      opacity: 1;
      pointer-events: auto;
    }
    .viewer-reset-btn:hover {
      background: var(--accent-gold);
      color: var(--surface-raised);
    }

    /* Spinner overlay (MODEL_LOADING state) */
    .model-spinner {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
      background: rgba(9,10,12,0.5);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .model-spinner.visible { opacity: 1; }
    .spinner-ring {
      width: 28px;
      height: 28px;
      border: 1px solid var(--border-machined);
      border-top-color: var(--accent-gold);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    /* Gallery slides (1+) */
    .gallery-img {
      max-width: calc(100% - 3rem);
      max-height: calc(100% - 3rem);
      object-fit: contain;
      border: 1px solid rgba(197,160,89,0.45);
    }
    .gallery-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      border: 1px dashed var(--border-machined);
      margin: 1.5rem;
      width: calc(100% - 3rem);
      height: calc(100% - 3rem);
    }
    .gallery-placeholder-label {
      font-family: var(--font-mono);
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-faint);
    }

    /* Carousel controls */
    .carousel-controls {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      height: 44px;
      min-height: 44px;
      border-top: 1px solid var(--border-dim);
      flex-shrink: 0;
    }
    #right-pane.has-project .carousel-controls { display: flex; }

    .carousel-dots {
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .carousel-dot {
      width: 4px;
      height: 4px;
      background: var(--border-machined);
      cursor: pointer;
      transition: background 0.2s, width 0.2s var(--ease-expo);
    }
    .carousel-dot.active { background: var(--accent-gold); width: 16px; }

    .carousel-slide-label {
      font-family: var(--font-mono);
      font-size: 0.52rem;
      letter-spacing: 0.15em;
      color: var(--text-faint);
    }

    /* Side carousel arrows (overlaid on the stage) */
    .carousel-side-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 6;
      width: 36px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(9,10,12,0.7);
      border: 1px solid var(--accent-gold);
      color: var(--accent-gold);
      font-family: var(--font-mono);
      font-size: 0.85rem;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: color 0.18s, border-color 0.18s, background 0.18s;
      user-select: none;
      opacity: 0;
      pointer-events: none;
    }
    .carousel-side-btn.visible {
      opacity: 1;
      pointer-events: auto;
    }
    .carousel-side-btn:hover {
      background: var(--accent-gold);
      color: var(--surface-raised);
    }
    .carousel-side-btn.left  { left: 12px; }
    .carousel-side-btn.right { right: 12px; }

    /* ── IDLE STATE (no project selected) ───────────────────── */
    .idle-message {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }
    .idle-label {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-faint);
    }

    /* ── ANIMATIONS ─────────────────────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    /* Hidden on desktop — mobile media query overrides below */
    #mobile-detail { display: none; }

    /* ── MOBILE (<768px) ────────────────────────────────────── */
    @media (max-width: 767px) {
      body { overflow-y: auto; }

      .project-viewer {
        display: block;
        height: auto;
        min-height: calc(100vh - var(--nav-h) - 44px);
      }

      #left-pane {
        border-right: none;
        height: calc(100vh - var(--nav-h) - 44px);
        overflow-y: auto;
      }

      .project-list { overflow-y: visible; }

      /* Hide right + center panes entirely on mobile — content moves into mobile-detail */
      #right-pane  { display: none; }
      #center-pane { display: none; }

      /* ── Mobile detail overlay ─────────────────────────────── */
      #mobile-detail {
        display: flex;
        flex-direction: column;
        position: fixed;
        inset: 0;
        z-index: 850;
        background: var(--bg-deep-space);
        transform: translateY(100vh);
        transition: transform 380ms var(--ease-expo);
        overflow-y: auto;
        overflow-x: hidden;
        padding-top: var(--nav-h);
      }
      #mobile-detail.open {
        transform: translateY(0);
      }

      .mobile-detail-bar {
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1rem;
        border-bottom: 1px solid var(--border-dim);
        position: sticky;
        top: 0;
        background: var(--bg-deep-space);
        z-index: 2;
        flex-shrink: 0;
      }

      .mobile-back-btn {
        font-family: var(--font-mono);
        font-size: 0.65rem;
        letter-spacing: 0.12em;
        color: var(--accent-gold);
        background: none;
        border: none;
        cursor: pointer;
        padding: 0.5rem 0;
        text-transform: uppercase;
      }

      .mobile-detail-title {
        font-family: var(--font-mono);
        font-size: 0.58rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--text-muted);
        flex: 1;
        text-align: center;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        padding: 0 0.5rem;
      }

      .mobile-detail-counter {
        font-family: var(--font-mono);
        font-size: 0.52rem;
        color: var(--text-faint);
        white-space: nowrap;
      }

      .mobile-carousel-zone {
        width: 100%;
        height: 58vw;
        min-height: 260px;
        max-height: 380px;
        position: relative;
        flex-shrink: 0;
        background: var(--bg-deep-space);
      }

      /* Carousel-wrap inherits flex:1 from desktop — override for mobile zone */
      .mobile-carousel-zone .carousel-wrap {
        position: absolute;
        inset: 0;
        flex: none;
      }

      /* Show side arrows on mobile inside the overlay */
      .mobile-carousel-zone .carousel-side-btn {
        display: flex;
      }

      .mobile-specs-zone {
        padding: 1.25rem 1rem 3rem;
        flex: 1;
      }

      /* Specs content inside mobile zone — remove fade-in opacity:0 */
      .mobile-specs-zone .spec-project-title,
      .mobile-specs-zone .spec-project-org,
      .mobile-specs-zone .spec-fade-item {
        opacity: 1 !important;
        transform: none !important;
      }

      /* Carousel controls bar visible inside mobile-detail */
      #mobile-detail .carousel-controls {
        display: flex;
        flex-shrink: 0;
      }

      .load-3d-btn { font-size: 0.55rem; padding: 0.5rem 1rem; }

      #three-stage { touch-action: none; }
    }

  </style>
</head>
<body>

  <!-- ── NAV ──────────────────────────────────────────────── -->
  <nav>
    <a class="nav-logo" href="index.html">Alejandro Diaz<span> — </span>Portfolio</a>
    <ul class="nav-links">
      <li><a href="index.html#about">About</a></li>
      <li><a href="index.html#experience">Experience</a></li>
      <li><a href="projects.html" class="active">Projects</a></li>
      <li><a href="index.html#coursework">Coursework</a></li>
      <li><a href="index.html#skills">Skills</a></li>
      <li><a href="index.html#contact">Contact</a></li>
    </ul>
  </nav>

  <!-- ── PAGE SHELL ───────────────────────────────────────── -->
  <div class="page-shell">

    <!-- Page header bar -->
    <div class="page-header">
      <span class="page-header-label">Engineering Projects</span>
      <span class="page-header-count" id="project-count">— / —</span>
    </div>

    <!-- 3-Pane Viewer -->
    <div class="project-viewer" id="project-viewer">

      <!-- ── LEFT PANE — Project List ─────────────────────── -->
      <div id="left-pane">
        <div class="left-pane-header">
          <span class="left-pane-header-label">Index</span>
        </div>
        <ul class="project-list" id="project-list">
          <!-- Rendered by JS -->
        </ul>
      </div>

      <!-- ── CENTER PANE — Specs Panel ────────────────────── -->
      <div id="center-pane">
        <div class="center-bracket-tl"></div>
        <div class="center-bracket-br"></div>

        <div class="center-header">
          <span class="center-header-label">Technical Specs</span>
          <button class="close-btn" id="close-specs" title="Close">×</button>
        </div>

        <div class="center-content" id="center-content">
          <!-- Populated by selectProject() -->
        </div>
      </div>

      <!-- ── RIGHT PANE — The Stage ────────────────────────── -->
      <div id="right-pane">

        <div class="stage-header">
          <span class="stage-project-name" id="stage-project-name">— Select a project</span>
          <span class="stage-slide-counter" id="stage-slide-counter">—</span>
        </div>

        <div class="carousel-wrap" id="carousel-wrap">

          <!-- HUD corner brackets -->
          <div class="hud-bracket tl"></div>
          <div class="hud-bracket tr"></div>
          <div class="hud-bracket bl"></div>
          <div class="hud-bracket br"></div>

          <!-- Side carousel arrows -->
          <button class="carousel-side-btn left" id="carousel-side-prev">&#8592;</button>
          <button class="carousel-side-btn right" id="carousel-side-next">&#8594;</button>

          <!-- Slide 0 — 3D Stage (always present for every project) -->
          <div class="carousel-slide" id="slide-0">
            <div class="slide-stage" id="slide-stage">

              <!-- Static render placeholder -->
              <div class="preview-placeholder" id="preview-placeholder">
                <div class="preview-placeholder-icon">⬡</div>
                <span class="preview-placeholder-label">Select a project</span>
              </div>

              <!-- Preview image (shown when project selected, model not loaded) -->
              <img class="preview-img" id="preview-img" src="" alt="" style="display:none;" />

              <!-- Spinner -->
              <div class="model-spinner" id="model-spinner">
                <div class="spinner-ring"></div>
              </div>

              <!-- Load Interactive 3D overlay -->
              <div class="load-3d-overlay" id="load-3d-overlay">
                <button class="load-3d-btn" id="load-3d-btn">Load Interactive 3D</button>
              </div>

              <!-- Three.js canvas singleton -->
              <canvas id="three-stage"></canvas>

            </div>
          </div>

          <!-- Gallery slides (1, 2) — cloned by JS per project -->
          <!-- Idle state overlay -->
          <div class="idle-message" id="idle-message">
            <span class="idle-label">Select a project</span>
          </div>

        </div><!-- /carousel-wrap -->

        <!-- Carousel controls -->
        <div class="carousel-controls">
          <div class="carousel-dots" id="carousel-dots"></div>
          <span class="carousel-slide-label" id="carousel-slide-label">—</span>
        </div>

      </div><!-- /right-pane -->

    </div><!-- /project-viewer -->

    <!-- ── MOBILE DETAIL OVERLAY ─────────────────────────── -->
    <div id="mobile-detail" aria-hidden="true">
      <div class="mobile-detail-bar">
        <button class="mobile-back-btn" id="mobile-back-btn">← Back</button>
        <span class="mobile-detail-title" id="mobile-detail-title"></span>
        <span class="mobile-detail-counter" id="mobile-detail-counter">—</span>
      </div>
      <div class="mobile-carousel-zone" id="mobile-carousel-zone"></div>
      <div class="mobile-specs-zone" id="mobile-specs-zone"></div>
    </div>

  </div><!-- /page-shell -->

  <script src="js/scramble.js"></script>
  <script src="js/viewer.js"></script>
  <script>
    /* ─────────────────────────────────────────────────────────
       LOAD PROJECT DATA & INIT
    ───────────────────────────────────────────────────────── */
    let PROJECTS = [];

    fetch('projects.json')
      .then(r => r.json())
      .then(data => {
        PROJECTS = data.projects;
        initApp();
      })
      .catch(e => console.error('Failed to load projects.json:', e));

    /* ─────────────────────────────────────────────────────────
       STATE
    ───────────────────────────────────────────────────────── */
    const state = {
      activeId:      null,   // currently selected project id
      slideIndex:    0,      // current carousel slide (0 = stage, 1+ = gallery)
      modelLoaded:   false,
      modelSrc:      null,
      isMobile:      window.innerWidth < 768,
      mobileView:    'list', // 'list' | 'detail'
    };

    /* ─────────────────────────────────────────────────────────
       DOM REFS
    ───────────────────────────────────────────────────────── */
    const $viewer      = document.getElementById('project-viewer');
    const $list        = document.getElementById('project-list');
    const $centerPane  = document.getElementById('center-pane');
    const $centerContent = document.getElementById('center-content');
    const $closeSpecs  = document.getElementById('close-specs');
    const $idleMsg     = document.getElementById('idle-message');
    const $prevImg     = document.getElementById('preview-img');
    const $placeholder = document.getElementById('preview-placeholder');
    const $load3dOverlay = document.getElementById('load-3d-overlay');
    const $load3dBtn   = document.getElementById('load-3d-btn');
    const $threeStage  = document.getElementById('three-stage');
    const $modelSpinner = document.getElementById('model-spinner');
    const $carouselWrap = document.getElementById('carousel-wrap');
    const $dots        = document.getElementById('carousel-dots');
    const $slideLabel  = document.getElementById('carousel-slide-label');
    const $stageName   = document.getElementById('stage-project-name');
    const $stageCounter = document.getElementById('stage-slide-counter');
    const $projectCount = document.getElementById('project-count');
    const $sidePrev    = document.getElementById('carousel-side-prev');
    const $sideNext    = document.getElementById('carousel-side-next');

    /* Mobile detail overlay refs */
    const $mobileDetail    = document.getElementById('mobile-detail');
    const $mobileBackBtn   = document.getElementById('mobile-back-btn');
    const $mobileTitle     = document.getElementById('mobile-detail-title');
    const $mobileCounter   = document.getElementById('mobile-detail-counter');
    const $mobileCarousel  = document.getElementById('mobile-carousel-zone');
    const $mobileSpecs     = document.getElementById('mobile-specs-zone');
    const $rightPane       = document.getElementById('right-pane');
    const $carouselControls = document.querySelector('.carousel-controls');

    /* ─────────────────────────────────────────────────────────
       RENDER LEFT PANE
    ───────────────────────────────────────────────────────── */
    function renderList() {
      $projectCount.textContent = `${PROJECTS.length} projects`;
      PROJECTS.forEach((p, i) => {
        const li = document.createElement('li');
        li.className = 'project-item';
        li.dataset.id = p.id;
        li.innerHTML = `
          <div class="item-indicator"></div>
          <div class="item-text">
            <div class="item-org">${p.org}</div>
            <div class="item-title">${p.title}</div>
            <div class="item-sub">${p.subtitle}</div>
          </div>
          <span class="item-arrow">›</span>
        `;
        li.addEventListener('click', () => selectProject(p.id));
        $list.appendChild(li);
      });
    }

    /* ─────────────────────────────────────────────────────────
       SELECT PROJECT
    ───────────────────────────────────────────────────────── */
    function selectProject(id) {
      const project = PROJECTS.find(p => p.id === id);
      if (!project) return;

      /* On mobile, delegate to overlay flow */
      if (state.isMobile) { openMobileDetail(id); return; }

      const isReselect = state.activeId === id;
      state.activeId = id;

      /* Reset model state when switching projects */
      if (!isReselect) {
        unloadModel();
      }

      /* Update list active state */
      document.querySelectorAll('.project-item').forEach(el => {
        el.classList.toggle('active', el.dataset.id === id);
      });

      /* Populate specs */
      renderSpecs(project);

      /* Open specs panel so the column transition starts */
      $viewer.classList.add('specs-open');

      setTimeout(() => {
        const titleEl = document.querySelector('#center-content .spec-project-title');
        if (titleEl) {
          titleEl.dataset.scrambleOriginal = project.title;
          new ScrambleText(titleEl, { duration: 700, delay: 0 }).run();
        }
        const orgEl = document.querySelector('#center-content .spec-project-org');
        if (orgEl) {
          const fullText = `${project.org} — ${project.subtitle}`;
          orgEl.style.opacity = '0';
          orgEl.textContent = fullText;
          orgEl.style.minHeight = orgEl.offsetHeight + 'px';
          orgEl.textContent = '';
          orgEl.style.opacity = '1';

          const orgStart = performance.now();
          const orgDuration = 700;
          const orgTick = (now) => {
            const progress = Math.min((now - orgStart) / orgDuration, 1);
            orgEl.textContent = fullText.slice(0, Math.floor(progress * fullText.length));
            if (progress < 1) {
              requestAnimationFrame(orgTick);
            } else {
              orgEl.textContent = fullText;
              orgEl.style.minHeight = '';
            }
          };
          requestAnimationFrame(orgTick);
        }
      }, 200);

      setTimeout(() => {
        const items = $centerContent.querySelectorAll('.spec-fade-item');
        anime({
          targets: items,
          opacity: [0, 1],
          translateY: [5, 0],
          duration: 280,
          delay: anime.stagger(35),
          easing: 'cubicBezier(0.19, 1, 0.22, 1)',
        });
      }, 820);

      /* Show stage assets */
      showProjectStage(project);

      /* Go to slide 0 */
      goToSlide(0, project);
    }

    /* ─────────────────────────────────────────────────────────
       RENDER SPECS PANEL
    ───────────────────────────────────────────────────────── */
    /* Split description text into sentence bullets.
       Splits on '. ' followed by an uppercase letter — preserves all content. */
    function descToBullets(text) {
      const raw = text.replace(/\.\s+(?=[A-Z0-9])/g, '.|').split('|');
      return raw.map(s => s.trim()).filter(s => s.length > 3);
    }

    function renderSpecs(project) {
      const softwareStr = project.software.join(' · ');
      const tagsHtml = project.tags.map(t => `<span class="spec-tag">${t}</span>`).join('');
      const bullets = descToBullets(project.description);
      const bulletsHtml = bullets.map(s => `<li>${s}</li>`).join('');

      $centerContent.innerHTML = `
        <div class="spec-project-title" style="opacity:0">${project.title}</div>
        <div class="spec-project-org" style="opacity:0">${project.org} — ${project.subtitle}</div>
        <ul class="exp-bullets spec-project-desc spec-fade-item" style="opacity:0">${bulletsHtml}</ul>

        <div class="spec-section-label spec-fade-item" style="opacity:0">Technical Data</div>
        ${project.specs.map(s => `
          <div class="spec-row spec-fade-item" style="opacity:0">
            <span class="spec-key">${s.key}</span>
            <span class="spec-val">${s.val}</span>
          </div>
        `).join('')}

        <div class="spec-section-label spec-fade-item" style="margin-top:1.5rem;opacity:0">Software</div>
        <div class="spec-row spec-fade-item" style="opacity:0">
          <span class="spec-key">Tools</span>
          <span class="spec-val gold">${softwareStr}</span>
        </div>

        <div class="spec-tags spec-fade-item" style="opacity:0">${tagsHtml}</div>
      `;

      /* Clone specs into mobile zone (opacity:0 overridden by mobile CSS) */
      $mobileSpecs.innerHTML = $centerContent.innerHTML;
    }

    /* ─────────────────────────────────────────────────────────
       SHOW STAGE ASSETS FOR PROJECT
    ───────────────────────────────────────────────────────── */
    function showProjectStage(project) {
      /* Hide idle message, activate right pane */
      $idleMsg.style.display = 'none';
      document.getElementById('right-pane').classList.add('has-project');

      /* Update stage name */
      $stageName.textContent = project.title;

      /* Slide 0 is always the 3D stage */
      $prevImg.style.display = 'none';

      const models = project.models || [];
      if (models.length > 0) {
        $load3dOverlay.classList.add('visible');
        $load3dBtn.textContent = models.length > 1 ? models[0].label : 'Load Interactive 3D';
        $placeholder.style.display = 'none';
      } else {
        $load3dOverlay.classList.remove('visible');
        $placeholder.style.display = 'flex';
        $placeholder.querySelector('.preview-placeholder-label').textContent = '3D Model — Coming Soon';
      }

      /* Build carousel slides */
      buildCarouselDots(project);
    }

    /* ─────────────────────────────────────────────────────────
       CAROUSEL
    ───────────────────────────────────────────────────────── */

    /* Remove old gallery slides (keep slide-0) */
    function clearGallerySlides() {
      $carouselWrap.querySelectorAll('.carousel-slide:not(#slide-0)').forEach(el => el.remove());
    }

    function buildCarouselDots(project) {
      clearGallerySlides();

      const models = project.models || [];
      const modelCount = Math.max(models.length, 1); /* at least 1 slot for 3D/placeholder */

      /* Build image slides after the 3D slot(s) */
      const imageSlides = [];
      if (project.preview) imageSlides.push({ src: project.preview, label: 'Render' });
      (project.gallery || []).forEach((src, i) => {
        if (src) imageSlides.push({ src, label: `Photo ${i + 1}` });
      });

      const total = modelCount + imageSlides.length;

      imageSlides.forEach((img, i) => {
        const slide = document.createElement('div');
        slide.className = 'carousel-slide';
        slide.id = `slide-${modelCount + i}`;
        slide.innerHTML = `<img class="gallery-img" src="${img.src}" alt="${project.title} — ${img.label}" loading="lazy" />`;
        $carouselWrap.appendChild(slide);
      });

      /* Build dots */
      $dots.innerHTML = '';
      const modelLabels = models.length > 0
        ? models.map(m => m.label)
        : ['3D Model — Coming Soon'];
      const labels = [...modelLabels, ...imageSlides.map(s => s.label)];

      labels.forEach((label, i) => {
        const dot = document.createElement('div');
        dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
        dot.title = label;
        dot.addEventListener('click', () => goToSlide(i, project));
        $dots.appendChild(dot);
      });

      /* Always start on slide 0 */
      goToSlide(0, project);
    }

    function goToSlide(index, project) {
      const project_ = project || PROJECTS.find(p => p.id === state.activeId);
      if (!project_) return;

      const models = project_.models || [];
      const modelCount = Math.max(models.length, 1);
      const imageSlides = [];
      if (project_.preview) imageSlides.push('Render');
      (project_.gallery || []).forEach((src, i) => { if (src) imageSlides.push(`Photo ${i + 1}`); });
      const total = modelCount + imageSlides.length;

      /* Bounds check */
      index = Math.max(0, Math.min(index, total - 1));
      state.slideIndex = index;

      const isOn3dSlide = index < modelCount;

      /* Activate correct slide — all 3D indices show slide-0, image indices map to dynamic slides */
      const slides = $carouselWrap.querySelectorAll('.carousel-slide');
      slides.forEach(s => s.classList.remove('active'));
      if (isOn3dSlide) {
        document.getElementById('slide-0').classList.add('active');
      } else {
        const imgSlideId = `slide-${index}`;
        const el = document.getElementById(imgSlideId);
        if (el) el.classList.add('active');
      }

      /* 3D canvas visibility */
      ModelViewer.setVisible(isOn3dSlide && state.modelLoaded);

      /* Widen specs pane when not on a 3D slide */
      $viewer.classList.toggle('wide-specs', !isOn3dSlide);

      /* Show/hide 3D overlay and placeholder based on current slide */
      if (isOn3dSlide) {
        if (models.length > 0) {
          /* Update button label for multi-model projects */
          $load3dBtn.textContent = models.length > 1 ? models[index].label : 'Load Interactive 3D';

          /* If model is loaded but it's the wrong one, show load button again */
          const targetSrc = models[index].src;
          if (state.modelLoaded && state.modelSrc === targetSrc) {
            $load3dOverlay.classList.remove('visible');
          } else if (!state.modelLoaded || state.modelSrc !== targetSrc) {
            ModelViewer.setVisible(false);
            $load3dOverlay.classList.add('visible');
          }
          $placeholder.style.display = 'none';
        } else {
          $load3dOverlay.classList.remove('visible');
          $placeholder.style.display = 'flex';
        }
      }

      /* Update dots */
      $dots.querySelectorAll('.carousel-dot').forEach((d, i) => {
        d.classList.toggle('active', i === index);
      });

      const modelLabels = models.length > 0
        ? models.map(m => m.label)
        : ['3D Model — Coming Soon'];
      const labels = [...modelLabels, ...imageSlides];
      updateCarouselControls(index, total, labels);
    }

    function updateCarouselControls(index, total, labels) {
      $slideLabel.textContent = labels[index] || '—';
      const counterText = total > 1 ? `${String(index + 1).padStart(2,'0')} / ${String(total).padStart(2,'0')}` : '—';
      $stageCounter.textContent = counterText;
      $mobileCounter.textContent = counterText;

      /* Side arrows — show only when there are multiple slides */
      if (total > 1) {
        $sidePrev.classList.toggle('visible', index > 0);
        $sideNext.classList.toggle('visible', index < total - 1);
      } else {
        $sidePrev.classList.remove('visible');
        $sideNext.classList.remove('visible');
      }
    }

    /* ─────────────────────────────────────────────────────────
       THREE.JS MODEL VIEWER — delegates to js/viewer.js
    ───────────────────────────────────────────────────────── */
    window.addEventListener('resize', () => ModelViewer.resize());

    async function loadModel() {
      const project = PROJECTS.find(p => p.id === state.activeId);
      if (!project) return;
      const models = project.models || [];
      const modelCount = Math.max(models.length, 1);
      if (models.length === 0 || state.slideIndex >= modelCount) return;

      const targetModel = models[state.slideIndex];
      if (state.modelLoaded && state.modelSrc === targetModel.src) return;

      $modelSpinner.classList.add('visible');
      $load3dOverlay.classList.remove('visible');

      try {
        await ModelViewer.init($threeStage);
        await ModelViewer.load(targetModel.src);

        state.modelLoaded = true;
        state.modelSrc = targetModel.src;
        $modelSpinner.classList.remove('visible');
        $threeStage.classList.add('loaded');

        if (state.slideIndex < modelCount) {
          ModelViewer.setVisible(true);
        }
      } catch (e) {
        console.error('Model load failed:', e);
        state.modelLoaded = false;
        $modelSpinner.classList.remove('visible');
        $load3dOverlay.classList.add('visible');
      }
    }

    function unloadModel() {
      $threeStage.classList.remove('loaded');
      ModelViewer.setVisible(false);
      ModelViewer.unload();
      state.modelLoaded = false;
      state.modelSrc = null;
      $modelSpinner.classList.remove('visible');
    }

    /* ─────────────────────────────────────────────────────────
       EVENT LISTENERS
    ───────────────────────────────────────────────────────── */

    $load3dBtn.addEventListener('click', () => {
      loadModel().catch(e => console.error('loadModel failed:', e));
    });

    $sidePrev.addEventListener('click', () => {
      const project = PROJECTS.find(p => p.id === state.activeId);
      goToSlide(state.slideIndex - 1, project);
    });

    $sideNext.addEventListener('click', () => {
      const project = PROJECTS.find(p => p.id === state.activeId);
      goToSlide(state.slideIndex + 1, project);
    });

    /* Close specs panel (desktop) */
    $closeSpecs.addEventListener('click', closeSpecs);

    function closeSpecs() {
      $viewer.classList.remove('specs-open');
    }

    /* ─────────────────────────────────────────────────────────
       MOBILE DETAIL — open / close
    ───────────────────────────────────────────────────────── */
    function openMobileDetail(id) {
      const project = PROJECTS.find(p => p.id === id);
      if (!project) return;

      state.mobileView = 'detail';
      state.activeId = id;

      /* Reset model when switching */
      unloadModel();

      /* Update list highlight */
      document.querySelectorAll('.project-item').forEach(el => {
        el.classList.toggle('active', el.dataset.id === id);
      });

      /* Populate specs + stage */
      renderSpecs(project);
      showProjectStage(project);

      /* Move carousel DOM into mobile overlay */
      $mobileCarousel.appendChild($carouselWrap);
      if ($carouselControls) $mobileDetail.insertBefore($carouselControls, $mobileSpecs);

      /* Update title bar */
      $mobileTitle.textContent = project.title;

      /* Go to slide 0 */
      goToSlide(0, project);

      /* Slide overlay in */
      $mobileDetail.setAttribute('aria-hidden', 'false');
      /* Force reflow so transform transition fires */
      void $mobileDetail.offsetHeight;
      $mobileDetail.classList.add('open');
      $mobileDetail.scrollTop = 0;

      /* Resize canvas after DOM move */
      requestAnimationFrame(() => ModelViewer.resize());
    }

    function closeMobileDetail() {
      state.mobileView = 'list';
      $mobileDetail.classList.remove('open');
      $mobileDetail.setAttribute('aria-hidden', 'true');

      /* After transition: move carousel back, unload model */
      setTimeout(() => {
        /* Move carousel DOM back to right-pane (controls first, then carousel before it) */
        if ($carouselControls) $rightPane.appendChild($carouselControls);
        $rightPane.insertBefore($carouselWrap, $carouselControls);

        unloadModel();

        /* Clear active state */
        document.querySelectorAll('.project-item').forEach(el => el.classList.remove('active'));
        state.activeId = null;

        /* Clear mobile zones */
        $mobileSpecs.innerHTML = '';
        $mobileTitle.textContent = '';
        $mobileCounter.textContent = '—';
      }, 380);
    }

    $mobileBackBtn.addEventListener('click', closeMobileDetail);

    /* ─────────────────────────────────────────────────────────
       LOCK SCROLL WHILE DRAGGING 3D MODEL (mobile)
    ───────────────────────────────────────────────────────── */
    (function () {
      $threeStage.addEventListener('touchmove', function (e) {
        if (state.isMobile && state.modelLoaded) e.preventDefault();
      }, { passive: false });
    })();

    /* ─────────────────────────────────────────────────────────
       SWIPE DOWN TO DISMISS (mobile detail)
    ───────────────────────────────────────────────────────── */
    (function () {
      var startY = 0;
      var startScrollTop = 0;
      var startTime = 0;
      var pulling = false;

      $mobileDetail.addEventListener('touchstart', function (e) {
        startY = e.touches[0].clientY;
        startScrollTop = $mobileDetail.scrollTop;
        startTime = Date.now();
        pulling = false;
      }, { passive: true });

      $mobileDetail.addEventListener('touchmove', function (e) {
        if (startScrollTop > 0) return;
        var deltaY = e.touches[0].clientY - startY;
        if (deltaY > 0) {
          pulling = true;
          $mobileDetail.style.transition = 'none';
          $mobileDetail.style.transform = 'translateY(' + (deltaY * 0.4) + 'px)';
          e.preventDefault();
        }
      }, { passive: false });

      $mobileDetail.addEventListener('touchend', function (e) {
        if (!pulling) return;
        var deltaY = e.changedTouches[0].clientY - startY;
        var elapsed = Date.now() - startTime;
        var velocity = deltaY / elapsed; /* px/ms */

        $mobileDetail.style.transition = '';
        $mobileDetail.style.transform = '';

        if (velocity > 0.5 || deltaY > 80) {
          closeMobileDetail();
        } else {
          /* Spring back */
          $mobileDetail.classList.add('open');
        }
        pulling = false;
      }, { passive: true });
    })();

    /* Keyboard nav */
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        if (state.isMobile && state.mobileView === 'detail') {
          closeMobileDetail();
        } else {
          closeSpecs();
        }
        return;
      }
      if (!state.activeId) return;
      const project = PROJECTS.find(p => p.id === state.activeId);
      if (e.key === 'ArrowRight') goToSlide(state.slideIndex + 1, project);
      if (e.key === 'ArrowLeft')  goToSlide(state.slideIndex - 1, project);
    });

    /* Resize handler — restore desktop layout when crossing 768px */
    window.addEventListener('resize', () => {
      const wasMobile = state.isMobile;
      state.isMobile = window.innerWidth < 768;

      if (wasMobile && !state.isMobile && state.mobileView === 'detail') {
        /* Crossed to desktop: move carousel back and close overlay */
        $mobileDetail.classList.remove('open');
        $mobileDetail.setAttribute('aria-hidden', 'true');
        if ($carouselControls) $rightPane.appendChild($carouselControls);
        $rightPane.insertBefore($carouselWrap, $carouselControls);
        state.mobileView = 'list';
        ModelViewer.resize();
      }
    });

    /* ─────────────────────────────────────────────────────────
       SWIPE SUPPORT (carousel)
    ───────────────────────────────────────────────────────── */
    (function () {
      let startX = 0;
      let startY = 0;
      let tracking = false;

      $carouselWrap.addEventListener('touchstart', function (e) {
        /* Don't hijack touches on the 3D canvas when model is loaded */
        const project = PROJECTS.find(p => p.id === state.activeId);
        const mCount = project ? Math.max((project.models || []).length, 1) : 1;
        if (state.modelLoaded && state.slideIndex < mCount &&
            e.target.closest('#three-stage')) return;
        const t = e.touches[0];
        startX = t.clientX;
        startY = t.clientY;
        tracking = true;
      }, { passive: true });

      $carouselWrap.addEventListener('touchmove', function (e) {
        if (!tracking) return;
        const dx = e.touches[0].clientX - startX;
        const dy = e.touches[0].clientY - startY;
        /* If moving more vertically, let the page scroll */
        if (Math.abs(dy) > Math.abs(dx)) {
          tracking = false;
          return;
        }
        /* Prevent vertical scroll while swiping horizontally */
        e.preventDefault();
      }, { passive: false });

      $carouselWrap.addEventListener('touchend', function (e) {
        if (!tracking) return;
        tracking = false;
        const endX = e.changedTouches[0].clientX;
        const dx = endX - startX;
        const threshold = 40;
        if (!state.activeId) return;
        const project = PROJECTS.find(p => p.id === state.activeId);
        if (dx < -threshold) goToSlide(state.slideIndex + 1, project);
        else if (dx > threshold) goToSlide(state.slideIndex - 1, project);
      }, { passive: true });
    })();

    /* ─────────────────────────────────────────────────────────
       INIT — called after projects.json loads
    ───────────────────────────────────────────────────────── */
    function initApp() {
      renderList();

      /* Auto-select project from URL param: projects.html?project=rcs-3dof */
      const urlProject = new URLSearchParams(location.search).get('project');
      if (urlProject) selectProject(urlProject);

      /* Bind hover scramble on left-pane org labels */
      document.querySelectorAll('.item-org').forEach(el => {
        el.addEventListener('mouseenter', () => {
          new ScrambleText(el, { duration: 400, contained: false }).run();
        });
      });

      /* Nav hover scramble */
      document.querySelectorAll('.nav-links a').forEach(el => {
        el.addEventListener('mouseenter', () => {
          new ScrambleText(el, { duration: 350 }).run();
        });
      });
      const navLogo = document.querySelector('.nav-logo');
      if (navLogo) {
        navLogo.addEventListener('mouseenter', () => {
          new ScrambleText(navLogo, { duration: 400 }).run();
        });
      }
    }
  </script>

</body>
</html>
