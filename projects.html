<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — Alejandro Diaz</title>
  <meta name="description" content="Engineering project portfolio — aerospace, robotics, and advanced manufacturing." />

  <!-- Stylesheets -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/animations.css" />

  <!-- Three.js importmap (required by CDN module internals) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
  }
  </script>

  <!-- Anime.js -->
  <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js"></script>

  <style>
    /* ── PROJECTS PAGE OVERRIDES ───────────────────────────── */
    :root {
      --left-w:   260px;
      --center-w: 360px;
    }

    body {
      overflow-y: hidden; /* viewer is full-height */
    }

    /* ── PAGE SHELL ─────────────────────────────────────────── */
    .page-shell {
      padding-top: var(--nav-h);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Page header bar */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 44px;
      min-height: 44px;
      border-bottom: 1px solid var(--border-dim);
      background: var(--surface-titanium);
    }
    .page-header-label {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--text-faint);
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .page-header-label::before {
      content: '';
      display: block;
      width: 16px;
      height: 1px;
      background: var(--accent-gold);
      opacity: 0.6;
    }
    .page-header-count {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.15em;
      color: var(--text-faint);
    }

    /* ── 3-PANE VIEWER ──────────────────────────────────────── */
    .project-viewer {
      display: grid;
      grid-template-columns: var(--left-w) 0px 1fr;
      flex: 1;
      min-height: 0;
      transition: grid-template-columns 300ms var(--ease-expo);
    }
    .project-viewer.specs-open {
      grid-template-columns: var(--left-w) var(--center-w) 1fr;
    }
    .project-viewer.specs-open.wide-specs {
      --center-w: 480px;
    }

    /* ── LEFT PANE ──────────────────────────────────────────── */
    #left-pane {
      border-right: 1px solid var(--border-machined);
      overflow-y: auto;
      overflow-x: hidden;
      background: var(--surface-titanium);
      display: flex;
      flex-direction: column;
    }
    #left-pane::-webkit-scrollbar { width: 2px; }

    .left-pane-header {
      padding: 1rem 1rem 0.75rem;
      border-bottom: 1px solid var(--border-dim);
      flex-shrink: 0;
    }
    .left-pane-header-label {
      font-family: var(--font-mono);
      font-size: 0.52rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--text-faint);
    }

    .project-list {
      list-style: none;
      flex: 1;
      overflow-y: auto;
    }

    .project-item {
      position: relative;
      padding: 0.9rem 1rem 0.9rem 1.25rem;
      border-bottom: 1px solid var(--border-dim);
      cursor: pointer;
      display: flex;
      align-items: stretch;
      gap: 0.75rem;
      transition: background 0.18s var(--ease-sine), transform 0.2s var(--ease-expo);
    }
    .project-item:hover { background: var(--surface-raised); transform: translateX(2px); }
    .project-item.active {
      background: var(--accent-gold-dim);
      transform: translateX(2px);
    }

    /* Gold left indicator bar */
    .item-indicator {
      width: 2px;
      background: transparent;
      border-radius: 0;
      flex-shrink: 0;
      align-self: stretch;
      transition: background 0.2s, width 0.2s var(--ease-expo);
    }
    .project-item:hover .item-indicator { background: rgba(197,160,89,0.4); }
    .project-item.active .item-indicator { background: var(--accent-gold); width: 3px; }

    .item-text { flex: 1; min-width: 0; }
    .item-org {
      font-family: var(--font-mono);
      font-size: 0.52rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent-gold);
      margin-bottom: 0.2rem;
      opacity: 0.8;
    }
    .item-title {
      font-size: 0.82rem;
      font-weight: 400;
      color: var(--text-primary);
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .item-sub {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      color: var(--text-faint);
      margin-top: 0.15rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .item-arrow {
      font-size: 0.6rem;
      color: var(--text-faint);
      align-self: center;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .project-item:hover .item-arrow,
    .project-item.active .item-arrow { opacity: 1; color: var(--accent-gold); }

    /* ── CENTER PANE ────────────────────────────────────────── */
    #center-pane {
      border-right: 1px solid var(--border-machined);
      overflow: hidden;
      background: var(--bg-deep-space);
      display: flex;
      flex-direction: column;
      position: relative;
      /* slide-in via opacity+translateX when grid column expands */
      opacity: 0;
      transform: translateX(-12px);
      transition:
        opacity 260ms var(--ease-expo) 60ms,
        transform 300ms var(--ease-expo) 40ms;
      pointer-events: none;
    }
    .specs-open #center-pane {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }

    .center-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.25rem;
      height: 44px;
      min-height: 44px;
      border-bottom: 1px solid var(--border-machined);
      flex-shrink: 0;
    }
    .center-header-label {
      font-family: var(--font-mono);
      font-size: 0.52rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--text-faint);
    }
    .close-btn {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-faint);
      font-size: 0.9rem;
      border: 1px solid transparent;
      transition: color 0.2s, border-color 0.2s;
      font-family: var(--font-mono);
    }
    .close-btn:hover { color: var(--text-primary); border-color: var(--border-machined); }

    .center-content {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 1.25rem;
    }
    .center-content::-webkit-scrollbar { width: 2px; }

    /* HUD corner brackets on center pane top-left */
    .center-bracket-tl,
    .center-bracket-br {
      position: absolute;
      width: 10px;
      height: 10px;
      pointer-events: none;
    }
    .center-bracket-tl {
      top: 44px;
      left: 0;
      border-top: 1px solid var(--accent-gold);
      border-left: 1px solid var(--accent-gold);
      opacity: 0.5;
    }
    .center-bracket-br {
      bottom: 0;
      right: 0;
      border-bottom: 1px solid var(--accent-gold);
      border-right: 1px solid var(--accent-gold);
      opacity: 0.5;
    }

    .spec-project-title {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text-primary);
      line-height: 1.2;
      margin-bottom: 0.2rem;
      transition: opacity 0.3s ease;
    }
    .spec-project-org {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent-gold);
      margin-bottom: 1rem;
      transition: opacity 0.3s ease;
    }
    .spec-project-desc {
      font-size: 0.8rem;
      color: var(--text-muted);
      line-height: 1.75;
      margin-bottom: 1.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border-dim);
    }

    /* Spec table */
    .spec-section-label {
      font-family: var(--font-mono);
      font-size: 0.5rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-faint);
      margin-bottom: 0.5rem;
      margin-top: 1.25rem;
      transition: opacity 0.3s ease;
    }
    .spec-row {
      display: grid;
      grid-template-columns: 90px 1fr;
      border-bottom: 1px solid var(--border-dim);
      padding: 0.45rem 0;
      align-items: start;
      transition: opacity 0.3s ease;
    }
    .spec-row:last-of-type { border-bottom: none; }
    .spec-key {
      font-family: var(--font-mono);
      font-size: 0.56rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-faint);
      padding-right: 0.75rem;
      line-height: 1.6;
      transition: opacity 0.3s ease;
    }
    .spec-val {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      color: var(--text-muted);
      line-height: 1.6;
      transition: opacity 0.3s ease;
    }
    .spec-val.gold { color: var(--accent-gold); }

    /* Tag pills */
    .spec-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-top: 1.25rem;
    }
    .spec-tag {
      font-family: var(--font-mono);
      font-size: 0.52rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-faint);
      padding: 0.2rem 0.55rem;
      border: 1px solid var(--border-machined);
      background: var(--surface-raised);
    }

    /* ── RIGHT PANE — THE STAGE ─────────────────────────────── */
    #right-pane {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg-deep-space);
      min-width: 0;
    }

    .stage-header {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      height: 44px;
      min-height: 44px;
      border-bottom: 1px solid var(--border-dim);
      flex-shrink: 0;
    }
    #right-pane.has-project .stage-header { display: flex; }
    .stage-project-name {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .stage-slide-counter {
      font-family: var(--font-mono);
      font-size: 0.52rem;
      letter-spacing: 0.15em;
      color: var(--text-faint);
    }

    /* Carousel wrapper */
    .carousel-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      min-height: 0;
    }

    /* Individual slides */
    .carousel-slide {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transform: scale(0.98);
      transition: opacity 320ms var(--ease-expo), transform 320ms var(--ease-expo);
    }
    .carousel-slide.active {
      opacity: 1;
      pointer-events: auto;
      transform: scale(1);
    }

    /* Slide 0 — 3D Stage */
    .slide-stage {
      position: relative;
      width: 100%;
      height: 100%;
    }

    /* Static preview image */
    .preview-img {
      max-width: calc(100% - 3rem);
      max-height: calc(100% - 3rem);
      object-fit: contain;
      border: 1px solid rgba(197,160,89,0.45);
    }

    /* Placeholder when no image is set */
    .preview-placeholder {
      width: 100%;
      height: 100%;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      color: var(--text-faint);
    }
    .preview-placeholder-icon {
      font-size: 2.5rem;
      opacity: 0.15;
    }
    .preview-placeholder-label {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-faint);
      opacity: 0.5;
    }

    /* HUD corner brackets around the stage — hidden until project selected */
    .hud-bracket {
      position: absolute;
      width: 18px;
      height: 18px;
      pointer-events: none;
      z-index: 2;
      display: none;
    }
    #right-pane.has-project .hud-bracket { display: block; }
    .hud-bracket.tl { top: 12px; left: 12px; border-top: 1px solid var(--accent-gold); border-left: 1px solid var(--accent-gold); opacity: 0.45; }
    .hud-bracket.tr { top: 12px; right: 12px; border-top: 1px solid var(--accent-gold); border-right: 1px solid var(--accent-gold); opacity: 0.45; }
    .hud-bracket.bl { bottom: 12px; left: 12px; border-bottom: 1px solid var(--accent-gold); border-left: 1px solid var(--accent-gold); opacity: 0.45; }
    .hud-bracket.br { bottom: 12px; right: 12px; border-bottom: 1px solid var(--accent-gold); border-right: 1px solid var(--accent-gold); opacity: 0.45; }

    /* "Load Interactive 3D" button overlay */
    .load-3d-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 3;
      pointer-events: none;
    }
    .load-3d-overlay.visible { pointer-events: auto; }

    .load-3d-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1.75rem;
      background: rgba(9,10,12,0.85);
      border: 1px solid var(--accent-gold);
      color: var(--accent-gold);
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background 0.2s, color 0.2s;
    }
    .load-3d-btn:hover { background: var(--accent-gold-dim); }
    .load-3d-btn::before {
      content: '⬡';
      font-size: 0.75rem;
      opacity: 0.7;
    }

    /* Three.js canvas — overlays slide 0 */
    #three-stage {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 4;
      visibility: hidden;
      opacity: 0;
      transition: opacity 260ms var(--ease-expo);
      touch-action: pan-y;
      display: block;
    }
    #three-stage.loaded {
      visibility: visible;
      opacity: 1;
    }

    /* Reset view button (injected by viewer.js) */
    .viewer-reset-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 7;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface-raised);
      border: 1px solid var(--accent-gold);
      color: var(--accent-gold);
      font-size: 0;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 260ms var(--ease-expo), background 0.18s, color 0.18s;
    }
    .viewer-reset-btn.visible {
      opacity: 1;
      pointer-events: auto;
    }
    .viewer-reset-btn:hover {
      background: var(--accent-gold);
      color: var(--surface-raised);
    }

    /* Spinner overlay (MODEL_LOADING state) */
    .model-spinner {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
      background: rgba(9,10,12,0.5);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .model-spinner.visible { opacity: 1; }
    .spinner-ring {
      width: 28px;
      height: 28px;
      border: 1px solid var(--border-machined);
      border-top-color: var(--accent-gold);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    /* Gallery slides (1+) */
    .gallery-img {
      max-width: calc(100% - 3rem);
      max-height: calc(100% - 3rem);
      object-fit: contain;
      border: 1px solid rgba(197,160,89,0.45);
    }
    .gallery-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      border: 1px dashed var(--border-machined);
      margin: 1.5rem;
      width: calc(100% - 3rem);
      height: calc(100% - 3rem);
    }
    .gallery-placeholder-label {
      font-family: var(--font-mono);
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-faint);
    }

    /* Carousel controls */
    .carousel-controls {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      height: 44px;
      min-height: 44px;
      border-top: 1px solid var(--border-dim);
      flex-shrink: 0;
    }
    #right-pane.has-project .carousel-controls { display: flex; }
    .carousel-nav {
      display: flex;
      align-items: center;
      gap: 0;
    }
    .carousel-btn {
      width: 44px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-faint);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      border: 1px solid transparent;
      background: none;
      transition: color 0.18s, border-color 0.18s;
      user-select: none;
    }
    .carousel-btn:hover { color: var(--text-primary); border-color: var(--border-machined); }
    .carousel-btn:disabled { opacity: 0.2; cursor: default; }

    .carousel-dots {
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .carousel-dot {
      width: 4px;
      height: 4px;
      background: var(--border-machined);
      cursor: pointer;
      transition: background 0.2s, width 0.2s var(--ease-expo);
    }
    .carousel-dot.active { background: var(--accent-gold); width: 16px; }

    .carousel-slide-label {
      font-family: var(--font-mono);
      font-size: 0.52rem;
      letter-spacing: 0.15em;
      color: var(--text-faint);
    }

    /* Side carousel arrows (overlaid on the stage) */
    .carousel-side-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 6;
      width: 36px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(9,10,12,0.7);
      border: 1px solid var(--border-machined);
      color: var(--text-faint);
      font-family: var(--font-mono);
      font-size: 0.85rem;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: color 0.18s, border-color 0.18s, background 0.18s;
      user-select: none;
      opacity: 0;
      pointer-events: none;
    }
    .carousel-side-btn.visible {
      opacity: 1;
      pointer-events: auto;
    }
    .carousel-side-btn:hover {
      color: var(--accent-gold);
      border-color: var(--accent-gold);
      background: rgba(9,10,12,0.85);
    }
    .carousel-side-btn.left  { left: 12px; }
    .carousel-side-btn.right { right: 12px; }

    /* ── IDLE STATE (no project selected) ───────────────────── */
    .idle-message {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }
    .idle-label {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-faint);
    }

    /* ── ANIMATIONS ─────────────────────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    /* ── MOBILE (<768px) ────────────────────────────────────── */
    @media (max-width: 767px) {
      body { overflow-y: auto; }

      .project-viewer {
        display: block;
        height: auto;
        min-height: calc(100vh - var(--nav-h) - 44px);
      }

      #left-pane {
        border-right: none;
        border-bottom: 1px solid var(--border-machined);
        height: auto;
        max-height: none;
        overflow-y: visible;
      }

      .project-list { overflow-y: visible; }

      #right-pane {
        height: 70vw;
        min-height: 280px;
        border-bottom: 1px solid var(--border-dim);
      }

      /* Center pane becomes fixed bottom sheet */
      #center-pane {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 80vh;
        max-height: 80vh;
        transform: translateY(100%);
        opacity: 1;
        z-index: 500;
        border-right: none;
        border-top: 1px solid var(--border-machined);
        transition: transform 400ms var(--ease-expo);
        pointer-events: none;
      }
      #center-pane.mobile-open {
        transform: translateY(0);
        pointer-events: auto;
      }

      .load-3d-btn { display: none; }
      .carousel-side-btn { display: none; }

      #three-stage { touch-action: pan-y; }

      .stage-header { display: none; }

      /* Mobile bottom sheet backdrop */
      .sheet-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(9,10,12,0.7);
        z-index: 499;
        cursor: pointer;
      }
      .sheet-backdrop.visible { display: block; }

      /* Show specs button on mobile */
      .mobile-specs-btn {
        display: flex;
      }

        const li = document.createElement('li');
        li.className = 'project-item';
        li.dataset.id = p.id;

          <div class="item-indicator"></div>
          <div class="item-text">
            <div class="item-org">${p.org}</div>
            <div class="item-title">${p.title}</div>
            <div class="item-sub">${p.subtitle}</div>
          </div>
          <span class="item-arrow">›</span>
        `;
        li.addEventListener('click', () => selectProject(p.id));
        $list.appendChild(li);
      });
    }

    /* ─────────────────────────────────────────────────────────
       SELECT PROJECT
    ───────────────────────────────────────────────────────── */
    function selectProject(id) {
      const project = PROJECTS.find(p => p.id === id);
      if (!project) return;

      const isReselect = state.activeId === id;
      state.activeId = id;

      /* Reset model state when switching projects */
      if (!isReselect) {
        unloadModel();
      }

      /* Update list active state */
      document.querySelectorAll('.project-item').forEach(el => {
        el.classList.toggle('active', el.dataset.id === id);
      });

      /* Populate specs */
      renderSpecs(project);

      /* Open specs panel first so the column transition starts
         and elements get their real rendered widths */
      $viewer.classList.add('specs-open');
      $centerPane.classList.add('mobile-open');
      $backdrop.classList.add('visible');

      setTimeout(() => {
        const titleEl = document.querySelector('.spec-project-title');
        if (titleEl) {
          titleEl.dataset.scrambleOriginal = project.title;
          new ScrambleText(titleEl, { duration: 700, delay: 0 }).run();
        }
        const orgEl = document.querySelector('.spec-project-org');
        if (orgEl) {
          const fullText = `${project.org} — ${project.subtitle}`;
          /* Render full text invisibly to lock stable height before typing starts */
          orgEl.style.opacity = '0';
          orgEl.textContent = fullText;
          orgEl.style.minHeight = orgEl.offsetHeight + 'px';
          orgEl.textContent = '';
          orgEl.style.opacity = '1';

          const orgStart = performance.now();
          const orgDuration = 700;
          const orgTick = (now) => {
            const progress = Math.min((now - orgStart) / orgDuration, 1);
            orgEl.textContent = fullText.slice(0, Math.floor(progress * fullText.length));
            if (progress < 1) {
              requestAnimationFrame(orgTick);
            } else {
              orgEl.textContent = fullText;
              orgEl.style.minHeight = '';
            }
          };
          requestAnimationFrame(orgTick);
        }
      }, 350);

      /* Show stage assets */
      showProjectStage(project);

      /* Go to slide 0 */
      goToSlide(0, project);

      /* On mobile: scroll to right pane */
      if (state.isMobile) {
        document.getElementById('right-pane').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }

    ───────────────────────────────────────────────────────── */
    /* Split description text into sentence bullets.
       Splits on '. ' followed by an uppercase letter — preserves all content. */
    function descToBullets(text) {
      const raw = text.replace(/\.\s+(?=[A-Z0-9])/g, '.|').split('|');
      return raw.map(s => s.trim()).filter(s => s.length > 3);
    }

    function renderSpecs(project) {
      const softwareStr = project.software.join(' · ');
      const tagsHtml = project.tags.map(t => `<span class="spec-tag">${t}</span>`).join('');
      const bullets = descToBullets(project.description);
      const bulletsHtml = bullets.map(s => `<li>${s}</li>`).join('');

      $centerContent.innerHTML = `
        <div class="spec-project-title" style="opacity:0">${project.title}</div>
        <div class="spec-project-org" style="opacity:0">${project.org} — ${project.subtitle}</div>
        <ul class="exp-bullets spec-project-desc">${bulletsHtml}</ul>

        <div class="spec-section-label">Technical Data</div>
        ${project.specs.map(s => `
          <div class="spec-row">
            <span class="spec-key">${s.key}</span>
            <span class="spec-val">${s.val}</span>
          </div>
        `).join('')}

        <div class="spec-section-label" style="margin-top:1.5rem;">Software</div>
        <div class="spec-row">
          <span class="spec-key">Tools</span>
          <span class="spec-val gold">${softwareStr}</span>
        </div>

        <div class="spec-tags">${tagsHtml}</div>
      `;
    }

    /* ─────────────────────────────────────────────────────────
       SHOW STAGE ASSETS FOR PROJECT
    ───────────────────────────────────────────────────────── */
    function showProjectStage(project) {
      /* Hide idle message, activate right pane */
      $idleMsg.style.display = 'none';
      document.getElementById('right-pane').classList.add('has-project');

      /* Update stage name */
      $stageName.textContent = project.title;

      /* Slide 0 is exclusively for the 3D viewer — no image underneath */
      $prevImg.style.display = 'none';
      $placeholder.style.display = 'none';

      /* Widen specs pane when no interactive 3D to show */
      $viewer.classList.toggle('wide-specs', !project.model);

      /* Show "Load Interactive 3D" button only if model exists */
      if (project.model) {
        $load3dOverlay.classList.add('visible');
        $placeholder.style.display = 'none';
      } else {
        $load3dOverlay.classList.remove('visible');
        /* Show a placeholder label on the 3D slide only if there's nothing else */
        if (!project.preview && (!project.gallery || project.gallery.filter(Boolean).length === 0)) {
          $placeholder.style.display = 'flex';
          $placeholder.querySelector('.preview-placeholder-label').textContent = project.title;
        }
      }

      /* Build carousel slides (preview + gallery go into slides 1+) */
      buildCarouselDots(project);
    }

    /* ─────────────────────────────────────────────────────────
       CAROUSEL
    ───────────────────────────────────────────────────────── */

    /* Remove old gallery slides (keep slide-0) */
    function clearGallerySlides() {
      $carouselWrap.querySelectorAll('.carousel-slide:not(#slide-0)').forEach(el => el.remove());
    }

    function buildCarouselDots(project) {
      clearGallerySlides();

      /* Combine preview + gallery into image slides (after slide 0 which is 3D-only) */
      const imageSlides = [];
      if (project.preview) imageSlides.push({ src: project.preview, label: 'Render' });
      (project.gallery || []).forEach((src, i) => {
        if (src) imageSlides.push({ src, label: `Photo ${i + 1}` });
      });

      const hasModel = !!project.model;
      const total = (hasModel ? 1 : 0) + imageSlides.length;

      imageSlides.forEach((img, i) => {
        const slideIdx = hasModel ? i + 1 : i;
        const slide = document.createElement('div');
        slide.className = 'carousel-slide';
        slide.id = `slide-${slideIdx}`;
        slide.innerHTML = `<img class="gallery-img" src="${img.src}" alt="${project.title} — ${img.label}" loading="lazy" />`;
        $carouselWrap.appendChild(slide);
      });

      /* If no model, hide slide-0 (3D stage) */
      document.getElementById('slide-0').style.display = hasModel ? '' : 'none';

      /* Build dots */
      $dots.innerHTML = '';
      const labels = hasModel
        ? ['Interactive 3D', ...imageSlides.map(s => s.label)]
        : imageSlides.map(s => s.label);

      labels.forEach((label, i) => {
        const dot = document.createElement('div');
        dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
        dot.title = label;
        dot.addEventListener('click', () => goToSlide(i, project));
        $dots.appendChild(dot);
      });

      /* For no-model projects, start on first image slide */
      if (!hasModel && imageSlides.length > 0) {
        goToSlide(0, project);
      } else {
        updateCarouselControls(0, total, labels);
      }
    }

    function goToSlide(index, project) {
      const project_ = project || PROJECTS.find(p => p.id === state.activeId);
      if (!project_) return;

      const hasModel = !!project_.model;
      const imageSlides = [];
      if (project_.preview) imageSlides.push('Render');
      (project_.gallery || []).forEach((src, i) => { if (src) imageSlides.push(`Photo ${i + 1}`); });
      const total = (hasModel ? 1 : 0) + imageSlides.length;

      /* Bounds check */
      index = Math.max(0, Math.min(index, total - 1));
      state.slideIndex = index;

      /* Activate correct slide — visible slides only */
      const slides = $carouselWrap.querySelectorAll('.carousel-slide:not([style*="display: none"])');
      slides.forEach((s, i) => s.classList.toggle('active', i === index));

      /* Handle Three.js canvas visibility — slide 0 is 3D only when model exists */
      const isOnThreeSlide = hasModel && index === 0;
      ModelViewer.setVisible(isOnThreeSlide && state.modelLoaded);

      /* Widen specs pane when not on the 3D slide */
      $viewer.classList.toggle('wide-specs', !isOnThreeSlide);

      /* Update dots */
      $dots.querySelectorAll('.carousel-dot').forEach((d, i) => {
        d.classList.toggle('active', i === index);
      });

      const labels = hasModel
        ? ['Interactive 3D', ...imageSlides]
        : imageSlides;
      updateCarouselControls(index, total, labels);
    }

    function updateCarouselControls(index, total, labels) {
      $prevBtn.disabled = index === 0;
      $nextBtn.disabled = index === total - 1;
      $slideLabel.textContent = labels[index] || '—';
      $stageCounter.textContent = total > 1 ? `${String(index + 1).padStart(2,'0')} / ${String(total).padStart(2,'0')}` : '—';

      /* Side arrows — show only when there are multiple slides */
      if (total > 1) {
        $sidePrev.classList.toggle('visible', index > 0);
        $sideNext.classList.toggle('visible', index < total - 1);
      } else {
        $sidePrev.classList.remove('visible');
        $sideNext.classList.remove('visible');
      }
    }

    /* ─────────────────────────────────────────────────────────
       THREE.JS MODEL VIEWER — delegates to js/viewer.js
    ───────────────────────────────────────────────────────── */
    window.addEventListener('resize', () => ModelViewer.resize());

    async function loadModel() {
      const project = PROJECTS.find(p => p.id === state.activeId);
      if (!project || !project.model) return;
      if (state.modelLoaded && state.modelSrc === project.model) return;

      $modelSpinner.classList.add('visible');
      $load3dOverlay.classList.remove('visible');

      try {
        await ModelViewer.init($threeStage);
        await ModelViewer.load(project.model);

        state.modelLoaded = true;
        state.modelSrc = project.model;
        $modelSpinner.classList.remove('visible');
        $threeStage.classList.add('loaded');

        if (state.slideIndex === 0) {
          ModelViewer.setVisible(true);
        }
      } catch (e) {
        console.error('Model load failed:', e);
        state.modelLoaded = false;
        $modelSpinner.classList.remove('visible');
        if (project.model) $load3dOverlay.classList.add('visible');
      }
    }

    function unloadModel() {
      $threeStage.classList.remove('loaded');
      ModelViewer.setVisible(false);
      ModelViewer.unload();
      state.modelLoaded = false;
      state.modelSrc = null;
      $modelSpinner.classList.remove('visible');
    }

    /* ─────────────────────────────────────────────────────────
       EVENT LISTENERS
    ───────────────────────────────────────────────────────── */

    $load3dBtn.addEventListener('click', () => {
      loadModel().catch(e => console.error('loadModel failed:', e));
    });

    $prevBtn.addEventListener('click', () => {
      const project = PROJECTS.find(p => p.id === state.activeId);
      goToSlide(state.slideIndex - 1, project);
    });

    $nextBtn.addEventListener('click', () => {
      const project = PROJECTS.find(p => p.id === state.activeId);
      goToSlide(state.slideIndex + 1, project);
    });

    $sidePrev.addEventListener('click', () => {
      const project = PROJECTS.find(p => p.id === state.activeId);
      goToSlide(state.slideIndex - 1, project);
    });

    $sideNext.addEventListener('click', () => {
      const project = PROJECTS.find(p => p.id === state.activeId);
      goToSlide(state.slideIndex + 1, project);
    });

    /* Close specs panel */
    $closeSpecs.addEventListener('click', closeSpecs);

    function closeSpecs() {
      $viewer.classList.remove('specs-open');
      $centerPane.classList.remove('mobile-open');
      $backdrop.classList.remove('visible');
    }

    /* Mobile backdrop tap */
    $backdrop.addEventListener('click', closeSpecs);

    /* Keyboard nav */
    document.addEventListener('keydown', e => {
      if (!state.activeId) return;
      const project = PROJECTS.find(p => p.id === state.activeId);
      if (e.key === 'ArrowRight') goToSlide(state.slideIndex + 1, project);
      if (e.key === 'ArrowLeft')  goToSlide(state.slideIndex - 1, project);
      if (e.key === 'Escape') closeSpecs();
    });

    /* Resize handler */
    window.addEventListener('resize', () => {
      state.isMobile = window.innerWidth < 768;
    });

    /* ─────────────────────────────────────────────────────────
       INIT
    ───────────────────────────────────────────────────────── */
    renderList();

    /* Bind hover scramble on left-pane org labels */
    document.querySelectorAll('.item-org').forEach(el => {
      el.addEventListener('mouseenter', () => {
        new ScrambleText(el, { duration: 400, contained: false }).run();
      });
    });

    /* Nav hover scramble */
    document.querySelectorAll('.nav-links a').forEach(el => {
      el.addEventListener('mouseenter', () => {
        new ScrambleText(el, { duration: 350 }).run();
      });
    });
    const navLogo = document.querySelector('.nav-logo');
    if (navLogo) {
      navLogo.addEventListener('mouseenter', () => {
        new ScrambleText(navLogo, { duration: 400 }).run();
      });
    }
  </script>

</body>
</html>
