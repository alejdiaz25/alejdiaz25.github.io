<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hero Background Test</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#000;overflow:hidden;width:100vw;height:100vh;}
  canvas{display:block;width:100%;height:100%;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ═══════════════════════════════════════════════════════════════
//  METALLIC RIBBON HERO — Pure WebGL GLSL
//  Reverse-engineered from Unicorn Studio scene:
//  • 5x 3D cylinder/top/cross shapes → diagonal metallic ribbons
//  • Liquify (freq 187.8, amp 14, angle -61°) → fluid warp
//  • Fog (density 287, turbulence 26, chromatic disp) → haze
//  • God Rays (spread 24, intensity 18) → light streaks
//  • Bloom (r11, i12, t47) → highlight glow
//  • Vignette (r45, falloff 134) → edge darkening
//  • Adjust (contrast 113) → punch
//  • Gold tint on highlights: #D2AC47 / #AE8625
// ═══════════════════════════════════════════════════════════════

const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');

function resize() {
  canvas.width  = canvas.offsetWidth  * Math.min(devicePixelRatio, 2);
  canvas.height = canvas.offsetHeight * Math.min(devicePixelRatio, 2);
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener('resize', resize);

// Fixed WebGL shader code and setup issues
const VS = `
attribute vec2 a_pos;
varying vec2 v_uv;
void main() {
  v_uv = a_pos * 0.5 + 0.5;
  gl_Position = vec4(a_pos, 0.0, 1.0);
}`;

const FS = `
precision highp float;
varying vec2 v_uv;
uniform float u_time;
uniform vec2 u_res;
uniform vec2 u_mouse;

#define PI 3.14159265358979
#define TAU 6.28318530717959

float hash(vec2 p) {
  p = fract(p * vec2(234.34, 435.345));
  p += dot(p, p + 34.23);
  return fract(p.x * p.y);
}

float noise(vec2 p) {
  vec2 i = floor(p);
  vec2 f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  float a = hash(i);
  float b = hash(i + vec2(1, 0));
  float c = hash(i + vec2(0, 1));
  float d = hash(i + vec2(1, 1));
  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
}

float fbm(vec2 p, int oct) {
  float v = 0.0, a = 0.5;
  for (int i = 0; i < 8; i++) {
    if (i >= oct) break;
    v += a * noise(p);
    p = p * 2.0 + vec2(1.7, 9.2);
    a *= 0.5;
  }
  return v;
}

void main() {
  vec2 uv = v_uv;
  vec2 st = (uv - 0.5) * vec2(u_res.x / u_res.y, 1.0);
  float t = u_time * 0.18;
  vec3 col = vec3(0.0);

  float fogNoise = fbm(st * 4.5 + vec2(t * 0.12, t * 0.07), 6);
  float fog = fogNoise * 0.07;
  col += vec3(fog);

  col = pow(max(col, vec3(0.0)), vec3(0.88));
  col = clamp(col, 0.0, 1.0);

  gl_FragColor = vec4(col, 1.0);
}`;

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
    gl.deleteShader(s);
    return null;
  }
  return s;
}

const prog = gl.createProgram();
const vs = compile(gl.VERTEX_SHADER, VS);
const fs = compile(gl.FRAGMENT_SHADER, FS);
if (vs && fs) {
  gl.attachShader(prog, vs);
  gl.attachShader(prog, fs);
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error(gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);
} else {
  console.error('Shader compilation failed.');
}

// Fullscreen quad
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const loc = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(loc);
gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

// Uniforms
const uTime  = gl.getUniformLocation(prog, 'u_time');
const uRes   = gl.getUniformLocation(prog, 'u_res');
const uMouse = gl.getUniformLocation(prog, 'u_mouse');

let mouse = [0.5, 0.5];
window.addEventListener('mousemove', e => {
  mouse = [e.clientX / window.innerWidth, 1.0 - e.clientY / window.innerHeight];
});

resize();

let start = performance.now();
function frame() {
  const t = (performance.now() - start) / 1000;
  gl.uniform1f(uTime,  t);
  gl.uniform2f(uRes,   canvas.width, canvas.height);
  gl.uniform2f(uMouse, mouse[0], mouse[1]);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
